# =============================================================================
# Phase 5.1 — Headline ABD3-small run on OpenWebText.
# =============================================================================
# dit_small (~110 M params) × OWT × 1 M steps on 8-GPU DDP.
# This produces the main paper number. Expected wall time ≈ 8-10 days on 8× A6000.
# =============================================================================

defaults:
  - algo: abd3
  - model: dit_small
  - data: openwebtext
  - noise: loglinear
  - _self_

seed: 42
mode: train
block_size: 4

tokenizer:
  name: gpt2

loader:
  # Per-GPU batch 8 × 8 GPUs × accum 2 = 128 effective.
  # (Compute-matched to BD3-LMs paper's 512 × 250 k ≈ our 128 × 500 k tokens.)
  # dit_small full attention at seq=1024 needs bf16 SDPA + bs≤8 to fit on 48 GiB.
  batch_size: 8
  eval_batch_size: 8
  num_workers: 4
  pin_memory: true
  tokenization_cache: true

training:
  max_steps: 500000
  ema: 0.9999
  antithetic_sampling: true
  sampling_eps: 1e-3
  precision: bf16-mixed
  accum: 2
  val_check_interval: 10000

optim:
  lr: 3e-4
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  grad_clip: 1.0
  warmup_steps: 10000  # 1 %

checkpointing:
  save_dir: checkpoints/phase5/abd3_owt/
  save_every: 25000

wandb:
  enabled: true
  project: abd3-owt
  name: abd3-owt-small-1M

eval:
  checkpoint_path: null
  gen_ppl_eval_model_name_or_path: gpt2
  perplexity_batch_size: 16
  disable_ema: false

sampling:
  kv_cache: true
  nucleus_p: 1.0
  first_hitting: false
