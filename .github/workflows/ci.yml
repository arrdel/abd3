name: ci

# Run unit tests + lint on every PR and push to main. We deliberately
# do NOT run the smoke train or any GPU job here — those require real
# CUDA and are run manually on the cluster before landing big changes.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        # v5 ships on Node 24 (v4 still uses Node 20, deprecated from 2026-06-02).
        uses: actions/checkout@v5

      - name: Set up Python
        # v6 ships on Node 24 (v5 still uses Node 20, same deprecation window).
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only torch wheel to keep CI fast; the production stack
          # uses CUDA builds from requirements.txt but CI only exercises
          # pure-Python paths (tokenizer math, sampler indexing, EMA state,
          # aggregation helpers) that are identical across backends.
          pip install --index-url https://download.pytorch.org/whl/cpu \
              "torch>=2.1,<2.5"
          pip install -r requirements.txt
          pip install pytest==8.3.3 ruff==0.6.9

      - name: Ruff (lint)
        run: ruff check abd3/ eval/ tools/ tests/

      - name: Ruff (format check)
        run: ruff format --check abd3/ eval/ tools/ tests/

      - name: Pytest
        env:
          # Force CPU-only for test determinism on the GH runner.
          CUDA_VISIBLE_DEVICES: ""
        run: python -m pytest tests/ -v
